# ============================================================================
# nRF54L15 Tag Demo — dual-role, dual-mode (RAS + inline-PCT) Channel Sounding
#                     plus onboard sensors (BME688, ADXL367, BMI270).
# ============================================================================

CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_DK_LIBRARY=y

# --- Bluetooth: dual-role (initiator = central, reflector = peripheral) ------
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
# Two simultaneous links: outbound central (CS reflector) + inbound peripheral
# (screen / phone / SMP host). The initiator advertises for a host while ranging.
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2
CONFIG_BT_BONDABLE=n
CONFIG_BT_DEVICE_NAME="nRF54L15 Tag"

CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DYNAMIC_DB=y

# --- Channel Sounding -------------------------------------------------------
CONFIG_BT_CHANNEL_SOUNDING=y
CONFIG_BT_CTLR_CHANNEL_SOUNDING_TEST=n
CONFIG_BT_CTLR_EXTENDED_FEAT_SET=y     # required for inline-PCT (IPT); harmless for RAS
CONFIG_BT_TRANSMIT_POWER_CONTROL=y

# --- RAS: both Requestor (initiator) and Responder (reflector) --------------
CONFIG_BT_RAS=y
CONFIG_BT_RAS_RREQ=y
CONFIG_BT_RAS_RRSP=y
CONFIG_BT_RAS_MODE_3_SUPPORTED=n

# --- Distance estimation library (shared by RAS + IPT) ----------------------
CONFIG_BT_CS_DE=y
CONFIG_BT_CS_DE_1024_NFFT=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- Scanning: UUID filter for RAS, name filter for IPT ---------------------
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=1
CONFIG_BT_SCAN_NAME_CNT=1

# --- Larger MTU/buffers (RAS Ranging Profile recommends >= 247-octet MTU) ---
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_ATT_PREPARE_COUNT=3
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_PHY_2M=y

# --- Extra TX buffering for sustained high-rate motion notifications --------
CONFIG_BT_ATT_TX_COUNT=8
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_CONN_TX_MAX=8

# --- Shorter Connection Intervals (SCI): sub-7.5 ms on the tag<->tag link ---
# Requires Extended Feature Set (above) + Subrating + Frame Space Update.
CONFIG_BT_LE_EXTENDED_FEAT_SET=y
CONFIG_BT_SUBRATING=y
CONFIG_BT_FRAME_SPACE_UPDATE=y
CONFIG_BT_SHORTER_CONNECTION_INTERVALS=y
# Connection-event length must be shorter than the (sub-7.5 ms) interval.
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=750
# Don't let the host auto-update conn params and fight the SCI rate.
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n

# Do NOT set BT_CTLR_SDC_CS_ROLE_*_ONLY — dual-role needs both roles.

# --- Sensors ----------------------------------------------------------------
CONFIG_SENSOR=y

# --- Logging + shell (over RTT; build with `-S rtt-console`) ----------------
# This board has no UART, so bind the shell to the SEGGER RTT backend
# (the default serial backend has no console device to attach to).
CONFIG_LOG=y
# Deferred (full) log mode — the default minimal mode supports neither runtime
# filtering nor the `log` shell command.
CONFIG_LOG_MODE_DEFERRED=y
# Runtime filtering + the `log` shell command give whole-module log control
# (`log enable/disable <lvl> <module>` for app_ble_core, app_cs, ...).
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_CMDS=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_RTT=y
# Dummy shell backend: required by the MCUmgr shell management group below
# (it runs shell commands and captures their output). Coexists with RTT.
CONFIG_SHELL_BACKEND_DUMMY=y

# --- MCUmgr / SMP over Bluetooth (remote shell + management) ----------------
# Exposes the cs/sensor/log shell commands over BLE (mcumgr / nRF Connect
# Device Manager). The SMP-BT GATT service auto-registers at boot.
# MCUMGR depends on (does not select) NET_BUF + ZCBOR; NET_BUF comes from BT.
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_GRP_SHELL=y
CONFIG_MCUMGR_GRP_OS=y
# SMP service permission: open (no encryption/auth). The default for BT_SMP is
# ..._PERM_RW_AUTHEN, which requires an authenticated (MITM/L3) link — unreachable
# on this NoInputNoOutput device (no pairing/IO-capability callbacks), so every SMP
# access would fail with "insufficient authentication". Open lets a screen/host use
# SMP with no pairing (acceptable for a demo).
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y


# Enable shorter distance demo
CONFIG_APP_UX_SHORT_DEMO=y